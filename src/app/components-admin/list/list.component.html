<div class="list-wrapper">
  <div class="top-bar">
    <ion-button fill="clear" (click)="goBack()" class="back-button">
      <ion-icon name="arrow-back-outline" slot="start"></ion-icon>
      Volver al Panel
    </ion-button>
  </div>

  <div class="main-content">
    <div class="header-section">
      <h1>{{ title }}</h1>
      <ion-button color="success" (click)="performAction('add')">
        <ion-icon name="add-outline" slot="start"></ion-icon>
        Nuevo Registro
      </ion-button>
    </div>

    <ion-searchbar 
      placeholder="Buscar..." 
      (ionInput)="handleSearch($event)">
    </ion-searchbar>

    <div class="table-container">
      <table class="admin-table">
        <thead>
          <tr>
            @for (header of headers; track header) {
              <th>{{ header }}</th>
            }
          </tr>
        </thead>
        <tbody>
          @for (item of filteredItems; track item.id) {
            <tr>
              <td>{{ item.id }}</td>
              <td><strong>{{ item.col1 }}</strong></td>
              <td>{{ item.col2 }}</td>
              <td class="actions">
                <ion-button fill="clear" color="primary" (click)="performAction('edit', item)">
                  <ion-icon name="create-outline" slot="icon-only"></ion-icon>
                </ion-button>
                <ion-button fill="clear" color="danger" (click)="performAction('delete', item)">
                  <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
                </ion-button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
