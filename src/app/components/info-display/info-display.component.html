<div class="info-container">
  <ion-grid>
    <ion-row>
      <ion-col size="12">
        <h1 class="procedure-title">{{ data?.title }}</h1>
      </ion-col>
    </ion-row>

    <ion-row>
      <ion-col size="12" size-md="6">
        <div class="content-box">
          <h2 class="section-header">
            <ion-icon name="list-outline"></ion-icon> REQUISITOS
          </h2>
          <ion-list lines="none">
            @for (req of data?.requirements; track req) {
              <ion-item>
                <ion-icon name="checkmark-circle-outline" slot="start" color="success"></ion-icon>
                <ion-label class="ion-text-wrap">{{ req }}</ion-label>
              </ion-item>
            }
          </ion-list>
        </div>
      </ion-col>

      <ion-col size="12" size-md="6">
        <div class="content-box">
          <h2 class="section-header">
            <ion-icon name="footsteps-outline"></ion-icon> PASOS A SEGUIR
          </h2>
          <ol class="steps-list">
            @for (step of data?.steps; track step) {
              <li>{{ step }}</li>
            }
          </ol>
        </div>
      </ion-col>
    </ion-row>

    <ion-row class="ion-align-items-center ion-margin-top">
      <ion-col size="12" size-md="8">
        <div class="cost-badge">
          Costo del trámite: <strong>${{ data?.cost }}</strong>
        </div>
      </ion-col>
      <ion-col size="12" size-md="4" class="ion-text-center">
        <div class="qr-container">
          <ion-icon name="qr-code-outline" class="qr-placeholder"></ion-icon>
          <p>Escanea para llevar la información</p>
        </div>
      </ion-col>
    </ion-row>
  </ion-grid>

  <div class="ion-text-center ion-margin-top">
    <ion-button fill="outline" color="dark" (click)="goBack()">
      <ion-icon name="arrow-back-outline" slot="start"></ion-icon>
      Volver
    </ion-button>
  </div>
</div>
